services:
  - type: web
    name: life-dashboard-mono
    runtime: python
    buildCommand: "cd frontend && npm install && npm run build && cd ../ && pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: MONGO_URI
        sync: false
      - key: SECRET_KEY
        sync: false
